        /* Estilos base */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

            color: #333;
            display: flex;

            height: 100vh;
            text-align: center;
        }

        .icon {
            font-size: 80px;
            margin-bottom: 20px;
            display: inline-block;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #2c3e50;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;

        }

        .contact-info {
            margin-top: 30px;
            font-size: 0.9rem;
            border-top: 1px solid #ddd;
            padding-top: 20px;
        }

        .contact-info a {
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }

        /* Decoración visual */
        .gear {
            fill: #3498db;
            width: 100px;
            height: 100px;
            margin-bottom: 20px;
        }
